<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>aterm Cast Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #frame { width: 100%; height: 100%; border: none; }
    #splash {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #111; color: #fff;
      font-family: sans-serif; font-size: 2vw;
      transition: opacity 0.4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash svg { width: 6vw; margin-bottom: 1.5vw; fill: #7c9fff; }
    #splash p { color: #888; margin-top: 0.5vw; font-size: 1.4vw; }
  </style>
</head>
<body>
  <iframe id="frame" allowfullscreen></iframe>
  <div id="splash">
    <!-- terminal icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 3h20a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1zm1 2v14h18V5H3zm3.293 3.293 1.414 1.414L5.414 12l2.293 2.293-1.414 1.414L3 12l3.293-3.707zM11 15h6v2h-6v-2z"/>
    </svg>
    <span>aterm</span>
    <p>Waiting for desktop stream…</p>
  </div>

  <!--
    Cast Application Framework (CAF) Web Receiver SDK.
    This page is hosted at https://krishnendu.github.io/aterm/cast-receiver/
    and registered at https://cast.google.com/publish as a Custom Receiver.
    The sender (aterm Android app) loads a noVNC URL via RemoteMediaClient;
    the receiver renders it full-screen inside an iframe so the TV sees the
    Linux desktop without any Cast overlay chrome.
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const frame = document.getElementById('frame');
    const splash = document.getElementById('splash');

    // Override media loading: instead of trying to play it as A/V, load the
    // content URL (the noVNC http://<phone-ip>:<port>/vnc.html URL) directly
    // in the iframe so the TV gets a live VNC desktop view.
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      request => {
        const url = request.media && request.media.contentId;
        if (url) {
          frame.src = url;
          frame.onload = () => splash.classList.add('hidden');
        }
        // Returning null tells CAF we handled it ourselves.
        return null;
      }
    );

    context.start({ disableIdleTimeout: true });
  </script>
</body>
</html>
